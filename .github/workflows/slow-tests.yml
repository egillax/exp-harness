name: Slow Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: slow-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup
        with:
          python-version: "3.12"

      - name: Pytest (slow)
        env:
          RUN_EXPERIMENT_TEST_SLOW: "1"
        run: uv run pytest -q -m slow

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci
